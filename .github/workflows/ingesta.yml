# Crons de ingesta F0 (docs/07-roadmap.md).
#
# Requisitos (Settings -> Secrets and variables -> Actions -> Secrets):
#   ODDS_API_KEY   key de The Odds API
#   DATABASE_URL   postgresql+psycopg://usuario:password@host/dbname
#
# Notas operativas:
# - Los schedules SOLO corren en la rama default (main): hay que mergear
#   la rama de desarrollo para que arranquen.
# - Los minutos de los cron son deliberadamente "raros" (17, 23, 53, 7, 37):
#   GitHub degrada los schedules del minuto :00 en horas pico — el
#   2026-07-09 el cron de 14:00 llevaba +100 min sin disparar y los del
#   día anterior salieron con 1-4 h de retraso. Minutos fuera de la hora
#   en punto reducen (no eliminan) ese retraso; el job audit_snapshots
#   detecta los huecos que igual se cuelen.
# - Los slots de snapshot son REDUNDANTES (:23 y :53 de cada hora de
#   captura): el 2026-07-10 el cron diario salió con 2h18m de retraso y
#   hubo que recuperar el día a mano (runs #39-#43). Con dos slots por
#   hora, un retraso de 1-2 h en uno ya no puede abrir un hueco > 4 h
#   (el umbral del audit) sin que el otro lo cubra. Costo: ~4 requests
#   extra al día a The Odds API — caben de sobra en el free tier con F5
#   apagado. Ambos slots comparten grupo de concurrency: si el de :23
#   sigue encolado cuando dispara el de :53, GitHub reemplaza el
#   pendiente — exactamente la deduplicación que se quiere.
# - El cron DIARIO también captura un snapshot (además del slate): los
#   audits del 07-10/11/12 salieron rojos por UN juego temprano por día
#   (inicio ~16:15Z) cuya única cobertura posible era el slot de 15:23
#   retrasado por GitHub hasta después del primer pitch — y :23/:53
#   comparten la misma hora pico, así que la redundancia intra-hora no
#   salva ese caso. El diario corre a las 14:17 en un grupo de
#   concurrency DISTINTO: es una tercera oportunidad independiente que
#   da a los juegos tempranos una captura matinal. Costo: 1 request/día.
# - GitHub desactiva los schedules tras ~60 dias sin actividad en el
#   repo; un commit cualquiera los reactiva.
# - Todos los jobs son idempotentes: una corrida duplicada no ensucia datos.

name: Ingesta EDGE

on:
  schedule:
    # Slate del dia + resultados/pitcheo de ayer (14:17 UTC ~ manana en America)
    - cron: '17 14 * * *'
    # snapshot_odds: archivo de lineas en horario de juegos MLB, con
    # slots redundantes :23/:53 (ver nota de arriba)
    - cron: '23,53 15,18,21,0 * * *'
    # Closing runs cada 30 min en la ventana de inicios (16:00-04:00 UTC
    # aprox). ALTO consumo de creditos: descomentar al pasar al plan 20K.
    # - cron: '7,37 16-23,0-3 * * *'
  workflow_dispatch:
    inputs:
      job:
        description: Job a ejecutar
        type: choice
        default: snapshot_odds
        options:
          - sync_schedule
          - sync_lineups
          - snapshot_odds
          - snapshot_odds_closing
          - backfill_results
          - backfill_pitching
          - sync_transactions
          - audit_snapshots
          - train_f1
          - apply_migration
          - repair_orphan_events
      args:
        description: 'Args extra (ej. --start-date 2024-03-20 --end-date 2024-10-01)'
        type: string
        default: ''

# Grupos separados por tipo de evento Y por schedule: los crons programados
# nunca desplazan de la cola a un backfill/entrenamiento manual, y el cron
# diario de mantenimiento nunca compite con los de snapshots (GitHub cancela
# la corrida PENDIENTE de un grupo cuando llega una tercera; con grupos
# separados eso solo puede pasar entre corridas del mismo cron, donde la
# nueva es un reemplazo válido). Los jobs son idempotentes y tocan tablas
# distintas: correr en paralelo es seguro.
concurrency:
  group: ingesta-${{ github.event_name }}-${{ github.event.schedule }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ingesta:
    runs-on: ubuntu-latest
    # Los backfills multi-temporada contra Postgres remoto pueden tardar;
    # los crons normales terminan en <1 min igualmente.
    timeout-minutes: 60
    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      # Repo Variable (Settings -> Secrets and variables -> Actions -> Variables).
      # En el free tier de The Odds API crear ODDS_INCLUDE_F5=false: el F5 usa
      # el endpoint por-evento (~2 creditos por juego por corrida) y el tier
      # gratis de 500 no alcanza. Con el plan 20K, borrar la variable o
      # ponerla en true.
      ODDS_INCLUDE_F5: ${{ vars.ODDS_INCLUDE_F5 || 'true' }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Instalar edge-api
        run: pip install --quiet ./apps/api

      - name: Ejecutar job
        env:
          EVENT_NAME: ${{ github.event_name }}
          SCHEDULE: ${{ github.event.schedule }}
          INPUT_JOB: ${{ inputs.job }}
          INPUT_ARGS: ${{ inputs.args }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            case "$INPUT_JOB" in
              sync_schedule)         python -m app.jobs.sync_schedule $INPUT_ARGS ;;
              sync_lineups)          python -m app.jobs.sync_lineups $INPUT_ARGS ;;
              snapshot_odds)         python -m app.jobs.snapshot_odds $INPUT_ARGS ;;
              snapshot_odds_closing) python -m app.jobs.snapshot_odds --closing-window-min 30 $INPUT_ARGS ;;
              backfill_results)      python -m app.jobs.backfill_results $INPUT_ARGS ;;
              backfill_pitching)     python -m app.jobs.backfill_pitching $INPUT_ARGS ;;
              sync_transactions)     python -m app.jobs.sync_transactions $INPUT_ARGS ;;
              audit_snapshots)       python -m app.jobs.audit_snapshots $INPUT_ARGS ;;
              train_f1)              pip install --quiet "./apps/api[ml]" && python -m app.jobs.train_f1 $INPUT_ARGS ;;
              apply_migration)       python -m app.jobs.apply_migration $INPUT_ARGS ;;
              repair_orphan_events)  python -m app.jobs.repair_orphan_events $INPUT_ARGS ;;
              *) echo "job desconocido: $INPUT_JOB" >&2; exit 1 ;;
            esac
          elif [ "$SCHEDULE" = "17 14 * * *" ]; then
            # Mantenimiento diario del corpus: slate de hoy (con probables),
            # UN snapshot matinal (la tercera oportunidad independiente que
            # cubre a los juegos tempranos — ver nota de cabecera),
            # resultados y game logs de los últimos 3 días (lookback: una
            # corrida saltada por GitHub se auto-repara al día siguiente;
            # skip-existing hace el re-proceso casi gratis), y auditoría de
            # huecos del archivo de odds de ayer — en rojo si hubo huecos.
            YDAY=$(date -u -d "yesterday" +%F)
            START=$(date -u -d "3 days ago" +%F)
            python -m app.jobs.sync_schedule
            python -m app.jobs.snapshot_odds
            python -m app.jobs.sync_lineups
            python -m app.jobs.backfill_results --start-date "$START" --end-date "$YDAY"
            python -m app.jobs.backfill_pitching --start-date "$START" --end-date "$YDAY"
            python -m app.jobs.sync_transactions --start-date "$START" --end-date "$YDAY"
            # El audit usa el MISMO lookback de 3 días que los backfills: la
            # detección (huecos, huérfanos de identidad) es one-shot sobre la
            # ventana auditada, y un cron diario saltado por GitHub dejaría el
            # día sin revisar para siempre con --start-date "$YDAY".
            python -m app.jobs.audit_snapshots --start-date "$START" --end-date "$YDAY" --fail-on-gaps
          elif [ "$SCHEDULE" = "7,37 16-23,0-3 * * *" ]; then
            python -m app.jobs.snapshot_odds --closing-window-min 30
          else
            # Antes de cada snapshot, refrescar slate y probables (1 llamada
            # MLB gratis): auto-repara el slate si el cron diario se saltó y
            # archiva los cambios de probable intradía (scratches) — justo
            # los eventos donde la línea más se mueve. El snapshot de odds va
            # ANTES de sync_lineups: es el dato irreemplazable (no se puede
            # re-fetchear una línea pasada), y sync_lineups hace N llamadas al
            # boxscore. sync_lineups archiva el lineup publicado as-of (§1.5)
            # conforme se publica (~1-4h antes) y es tolerante a fallos por
            # juego, así que aunque falle no arrastra al snapshot.
            python -m app.jobs.sync_schedule
            python -m app.jobs.snapshot_odds
            python -m app.jobs.sync_lineups
          fi
